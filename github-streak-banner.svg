<svg width="850" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec407a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ec407a;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ec407a;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filters for glow effects -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animation for pulsing glow -->
    <animate id="pulse" attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="250" rx="12" fill="url(#cardGradient)" stroke="#30363d" stroke-width="1"/>
  
  <!-- Radial glow overlay -->
  <ellipse cx="425" cy="125" rx="500" ry="300" fill="url(#glowGradient)"/>
  
  <!-- Left Divider Line -->
  <line x1="270" y1="65" x2="270" y2="185" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  
  <!-- Right Divider Line -->
  <line x1="580" y1="65" x2="580" y2="185" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  
  <!-- LEFT SECTION: Total Contributions -->
  <g transform="translate(135, 125)">
    <!-- Number with glow -->
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" fill="#ec407a" filter="url(#pinkGlow)">734</text>
    
    <!-- Label -->
    <text x="0" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#8b949e" letter-spacing="0.3">Total Contributions</text>
    
    <!-- Date -->
    <text x="0" y="50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#6e7681">Mar 31, 2023 – Present</text>
  </g>
  
  <!-- CENTER SECTION: Current Streak -->
  <g transform="translate(425, 125)">
    <!-- Outer glow circle (animated) -->
    <circle cx="0" cy="-15" r="75" fill="none" stroke="#ec407a" stroke-width="3" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Main circle background -->
    <circle cx="0" cy="-15" r="70" fill="url(#circleGradient)"/>
    
    <!-- Circle border with glow -->
    <circle cx="0" cy="-15" r="70" fill="none" stroke="#ec407a" stroke-width="4" filter="url(#pinkGlow)"/>
    
    <!-- Inner shadow effect -->
    <circle cx="0" cy="-15" r="65" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
    
    <!-- Flame icon -->
    <g transform="translate(0, -89)">
      <path d="M 0 0 C -3 6 -6 8 -6 14 C -6 18 -4 21 0 21 C 4 21 6 18 6 14 C 6 8 3 6 0 0 Z" 
            fill="url(#flameGradient)" filter="url(#flameGlow)"/>
    </g>
    
    <!-- Streak number with glow -->
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="800" fill="#ffd93d" filter="url(#yellowGlow)">967</text>
    
    <!-- Current Streak label -->
    <text x="0" y="75" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#ffd93d" letter-spacing="0.5">Current Streak</text>
    
    <!-- Date -->
    <text x="0" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#6e7681">Mar 31, 2023 – Mar 31, 2026</text>
  </g>
  
  <!-- RIGHT SECTION: Longest Streak -->
  <g transform="translate(715, 125)">
    <!-- Number with glow -->
    <text x="0" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="700" fill="#ec407a" filter="url(#pinkGlow)">1000</text>
    
    <!-- Label -->
    <text x="0" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="500" fill="#8b949e" letter-spacing="0.3">Longest Streak</text>
    
    <!-- Date -->
    <text x="0" y="50" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#6e7681">Feb 20 – Mar 8</text>
  </g>
</svg>